<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty English: Keratin Talk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 font-sans p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <div class="mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-black text-fuchsia-500 uppercase tracking-tighter">Beauty English: Keratin Talk</h1>
            <p class="text-slate-400 text-sm">Portal oficial de capacitación - Módulos de atención técnica.</p>
        </div>

        <div id="content" class="space-y-8">
            </div>
    </div>

    <script>
        const curriculum = [
            {
                u: "Unidad 1",
                clases: [
                    { id: 1, title: "Welcoming the Customer", v: [["Good morning/afternoon", "Buenos días/tardes"], ["Welcome to the salon", "Bienvenido al salón"], ["Please, take a seat", "Por favor, tome asiento"]], link: "#" },
                    { id: 2, title: "Personal Information", v: [["What is your name?", "¿Cuál es su nombre?"], ["Can you spell it?", "¿Puede deletrearlo?"]], link: "#" }
                ]
            },
            {
                u: "Unidad 2",
                clases: [
                    { id: 3, title: "Explaining the Process", v: [["First, we wash hair", "Primero, lavamos el cabello"], ["Then, we dry it", "Luego, lo secamos"], ["We use the flat iron", "Usamos la plancha"]], link: "#" },
                    { id: 4, title: "Talking about Price and Time", v: [["The price is $40", "El precio es $40"], ["It takes two hours", "Toma dos horas"], ["Pay by cash or card", "Pagar en efectivo o tarjeta"]], link: "#" }
                ]
            },
            {
                u: "Unidad 3",
                clases: [
                    { id: 5, title: "Customer Consultation", v: [["First keratin treatment?", "¿Primer tratamiento?"], ["Any allergies?", "¿Alguna alergia?"], ["Is hair colored?", "¿Cabello teñido?"]], link: "#" },
                    { id: 6, title: "Saying Goodbye", v: [["Thank you for coming", "Gracias por venir"], ["Have a nice day", "Que tenga buen día"], ["See you next time", "Hasta la próxima"]], link: "#" }
                ]
            }
        ];

        function render() {
            const container = document.getElementById('content');
            curriculum.forEach(unidad => {
                let html = `<div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl">
                    <h2 class="text-lg font-bold text-cyan-400 mb-4 uppercase tracking-widest">${unidad.u}</h2>
                    <div class="grid md:grid-cols-2 gap-4">`;
                unidad.clases.forEach(c => {
                    html += `
                    <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 hover:border-fuchsia-900 transition">
                        <h3 class="font-bold text-white mb-3 text-sm">Clase ${c.id}: ${c.title}</h3>
                        <ul class="text-xs text-slate-400 space-y-2 mb-4">
                            ${c.v.map(v => `<li><span class="text-fuchsia-500 font-bold">●</span> ${v[0]} <span class="text-slate-600">/ ${v[1]}</span></li>`).join('')}
                        </ul>
                        <div class="flex gap-2">
                            <button onclick="speak('${c.v.map(v => v[0]).join('. ')}')" class="bg-fuchsia-600 px-3 py-1.5 rounded-lg text-xs font-bold text-white hover:bg-fuchsia-500 transition">Escuchar</button>
                            <a href="${c.link}" target="_blank" class="bg-slate-800 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-300 border border-slate-700 hover:bg-slate-700">Practicar</a>
                        </div>
                    </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        render();
    </script>
</body>
</html>
